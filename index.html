<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<title>Prompter Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080810;
  --card:      #0f0f1c;
  --card2:     #14142a;
  --border:    rgba(255,255,255,0.08);
  --red:       #ff3b3b;
  --cyan:      #00d4ff;
  --gold:      #ffb800;
  --white:     #f2f2ff;
  --muted:     #5a5a7a;
  --font-h:    'Bebas Neue', sans-serif;
  --font-b:    'Nunito', sans-serif;
  --safe-b:    env(safe-area-inset-bottom, 0px);
  --safe-t:    env(safe-area-inset-top, 0px);
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--white);
  font-family: var(--font-b);
  padding-top: var(--safe-t);
}
button { font-family: var(--font-b); cursor: pointer; border: none; outline: none; }
textarea { font-family: var(--font-b); outline: none; border: none; resize: none; }
select { font-family: var(--font-b); outline: none; }

/* ─── SCREENS ─── */
.screen { position: fixed; inset: 0; top: var(--safe-t); display: flex; flex-direction: column; transition: opacity 0.3s, transform 0.3s; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

/* ════════════════════════════════════
   SCREEN 1 — SCRIPT SETUP
════════════════════════════════════ */
#screen-script {
  background: var(--bg);
  padding: 0;
}

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
}
.logo-text {
  font-family: var(--font-h);
  font-size: 22px; letter-spacing: 0.08em;
  color: var(--white);
}
.logo-text span { color: var(--cyan); }
.logo-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--red);
  margin-right: 7px;
  box-shadow: 0 0 8px var(--red);
  animation: blink 2.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.script-body {
  flex: 1; overflow-y: auto;
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 14px;
}

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
  padding-left: 2px;
}

#script-input {
  width: 100%; min-height: 190px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  color: var(--white); font-size: 15px; line-height: 1.7;
  transition: border-color 0.2s;
}
#script-input:focus { border-color: rgba(0,212,255,0.4); background: var(--card2); }

/* Controls grid */
.controls-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.ctrl-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
}
.ctrl-card-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.ctrl-card-val {
  font-family: var(--font-h); font-size: 26px; color: var(--cyan);
  margin-bottom: 6px;
}
input[type=range] {
  width: 100%; -webkit-appearance: none; height: 4px;
  background: var(--card2); border-radius: 2px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: var(--cyan);
  box-shadow: 0 0 8px rgba(0,212,255,0.6);
  cursor: pointer;
}

/* Toggle pills */
.toggle-pills {
  display: flex; gap: 8px;
}
.pill {
  flex: 1; padding: 10px 0; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted);
  transition: all 0.18s; text-align: center;
}
.pill.on {
  background: rgba(0,212,255,0.12);
  border-color: rgba(0,212,255,0.5);
  color: var(--cyan);
}
.pill.on-red {
  background: rgba(255,59,59,0.12);
  border-color: rgba(255,59,59,0.5);
  color: var(--red);
}

/* Camera select */
.cam-select {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  color: var(--white); font-size: 14px; font-weight: 600;
  -webkit-appearance: none; appearance: none;
}

/* START button */
.btn-start {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, var(--cyan), #0090cc);
  border-radius: 16px; color: var(--bg);
  font-size: 16px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase;
  box-shadow: 0 6px 28px rgba(0,212,255,0.35);
  transition: all 0.2s;
  margin-bottom: calc(var(--safe-b) + 8px);
}
.btn-start:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,212,255,0.2); }

/* ════════════════════════════════════
   SCREEN 2 — STUDIO (RECORDING)
════════════════════════════════════ */
#screen-studio {
  background: #000;
  overflow: hidden;
}

/* Full camera */
#camera-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  background: #000;
}

/* Three overlay */
#three-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}

/* HUD frame corners */
.hud { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
.corner {
  position: absolute; width: 26px; height: 26px;
}
.corner.tl { top: 18px; left: 18px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
.corner.tr { top: 18px; right: 18px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
.corner.bl { bottom: 140px; left: 18px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
.corner.br { bottom: 140px; right: 18px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

/* Eye line */
.eye-line {
  position: absolute; left: 8%; right: 8%; top: 28%;
  height: 1px; background: rgba(255,184,0,0.4);
  z-index: 3; pointer-events: none;
}
.eye-line-label {
  position: absolute; right: calc(8% + 8px); top: calc(28% - 15px);
  font-size: 8px; letter-spacing: 0.14em; font-weight: 700;
  color: rgba(255,184,0,0.5); z-index: 3; pointer-events: none;
  text-transform: uppercase;
}

/* Reading focus line */
.read-line {
  position: absolute; left: 6%; right: 6%; top: 37%;
  height: 2px; z-index: 4; pointer-events: none;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.55; border-radius: 1px;
  box-shadow: 0 0 10px rgba(0,212,255,0.5);
}

/* TELEPROMPTER TEXT */
#tp-overlay {
  position: absolute; inset: 0; z-index: 5;
  pointer-events: none; overflow: hidden;
}
#tp-mask {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.75) 0%,
    transparent 20%,
    transparent 72%,
    rgba(0,0,0,0.85) 100%
  );
}
#tp-track {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 2; padding: 0 22px;
}
#tp-text {
  font-size: 26px; font-weight: 700; line-height: 1.55;
  font-family: var(--font-b);
  color: #fff; text-align: center;
  padding-bottom: 58%;
  text-shadow: 0 2px 16px rgba(0,0,0,0.95), 0 0 32px rgba(0,0,0,0.8);
}
#tp-text.mirror { transform: scaleX(-1); }

/* REC badge */
#rec-badge {
  position: absolute; top: 22px; left: 22px; z-index: 10;
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,59,59,0.35);
  border-radius: 99px; padding: 6px 12px;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#rec-badge.show { opacity: 1; }
#rec-dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }
#rec-time-live { font-family: var(--font-h); font-size: 18px; letter-spacing: 0.06em; color: var(--white); }

/* SPEED HUD */
#speed-hud {
  position: absolute; top: 22px; right: 22px; z-index: 10;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(0,212,255,0.25); border-radius: 10px;
  padding: 6px 11px; pointer-events: none;
  font-family: var(--font-h); font-size: 20px; color: var(--cyan);
  letter-spacing: 0.05em;
}

/* BOTTOM CONTROLS */
#studio-controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 16px 22px calc(var(--safe-b) + 18px);
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
  display: flex; flex-direction: column; gap: 12px;
}

/* Prompter control bar */
.prompt-bar {
  display: flex; align-items: center; gap: 10px;
}
.speed-row {
  display: flex; align-items: center; gap: 10px;
}
.speed-row span {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); min-width: 46px;
}
.speed-row input[type=range] { flex: 1; }
.speed-row .sv {
  font-family: var(--font-h); font-size: 18px; color: var(--cyan);
  min-width: 40px; text-align: right;
}

/* Action buttons row */
.action-row {
  display: flex; align-items: center; justify-content: center; gap: 18px;
}
.act-btn {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  transition: all 0.18s;
}
.act-btn:active { transform: scale(0.91); }
.act-btn.primary {
  width: 68px; height: 68px; font-size: 26px;
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 22px rgba(255,59,59,0.5);
}
.act-btn.primary.recording {
  animation: rec-glow 1.4s infinite;
}
@keyframes rec-glow {
  0%,100%{ box-shadow: 0 0 22px rgba(255,59,59,0.5); }
  50%{ box-shadow: 0 0 42px rgba(255,59,59,0.9); }
}
.act-btn.start-stop {
  width: 60px; height: 60px;
  background: rgba(0,212,255,0.15);
  border-color: rgba(0,212,255,0.5);
  font-size: 22px;
}
.act-btn.marker-btn {
  background: rgba(255,184,0,0.12);
  border-color: rgba(255,184,0,0.4);
}

/* Prompt toggle */
#btn-prompt-toggle {
  flex: 1; padding: 12px;
  background: rgba(0,212,255,0.12);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 12px;
  color: var(--cyan); font-size: 13px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.18s;
}
#btn-prompt-toggle:active { transform: scale(0.97); }
#btn-prompt-toggle.running {
  background: rgba(0,212,255,0.2);
  border-color: var(--cyan);
}
.back-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 11px 16px;
  color: var(--muted); font-size: 12px; font-weight: 700;
  letter-spacing: 0.05em;
}

/* ════════════════════════════════════
   SCREEN 3 — SAVE / DOWNLOAD
════════════════════════════════════ */
#screen-save {
  background: var(--bg);
  padding: 0;
  justify-content: center; align-items: center;
}
.save-box {
  width: 100%; padding: 32px 24px;
  display: flex; flex-direction: column; gap: 20px; align-items: center;
}
.save-icon { font-size: 56px; }
.save-title { font-family: var(--font-h); font-size: 30px; letter-spacing: 0.08em; text-align: center; }
.save-sub { color: var(--muted); font-size: 14px; font-weight: 600; text-align: center; line-height: 1.6; }
.save-info {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 8px;
}
.save-row { display: flex; justify-content: space-between; align-items: center; }
.save-row-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.save-row-val { font-family: var(--font-h); font-size: 18px; color: var(--cyan); }
.btn-download {
  width: 100%; padding: 20px;
  background: linear-gradient(135deg, #00d4ff, #0090cc);
  border-radius: 16px; color: var(--bg);
  font-size: 17px; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase;
  box-shadow: 0 6px 28px rgba(0,212,255,0.4);
  transition: all 0.2s;
  text-decoration: none; display: flex;
  align-items: center; justify-content: center; gap: 10px;
}
.btn-download:active { transform: scale(0.97); }
.btn-new {
  width: 100%; padding: 16px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 14px; color: var(--muted);
  font-size: 14px; font-weight: 700;
  transition: all 0.2s;
}
.btn-new:active { background: var(--card); }

/* ─── TOAST ─── */
#toast {
  position: fixed; bottom: calc(var(--safe-b) + 24px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 20px;
  font-size: 13px; font-weight: 700; white-space: nowrap;
  z-index: 999; opacity: 0; transition: all 0.3s;
  pointer-events: none; max-width: 88vw;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.green { border-color: rgba(0,212,255,0.5); color: var(--cyan); }
#toast.orange { border-color: rgba(255,184,0,0.5); color: var(--gold); }
#toast.red { border-color: rgba(255,59,59,0.5); color: var(--red); }

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     SCREEN 1 — SCRIPT SETUP
═══════════════════════════════════ -->
<div class="screen" id="screen-script">
  <div class="top-bar">
    <div class="logo-text"><span class="logo-dot"></span>PROMPTER <span>STUDIO</span></div>
    <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;color:var(--muted)">v2.0</div>
  </div>

  <div class="script-body">

    <!-- Script -->
    <div class="section-label">Seu Script</div>
    <textarea id="script-input" placeholder="Digite ou cole seu roteiro aqui...

Dica: Use [PAUSE] para marcar pausas e [SEÇÃO: Título] para dividir partes.

O teleprompter vai rolar automaticamente enquanto você grava."></textarea>

    <!-- Speed + Font -->
    <div class="controls-grid">
      <div class="ctrl-card">
        <div class="ctrl-card-label">Velocidade</div>
        <div class="ctrl-card-val" id="v-speed">1.2×</div>
        <input type="range" id="r-speed" min="0.3" max="5" step="0.1" value="1.2" oninput="setSpeed(this.value)">
      </div>
      <div class="ctrl-card">
        <div class="ctrl-card-label">Fonte</div>
        <div class="ctrl-card-val" id="v-font">26px</div>
        <input type="range" id="r-font" min="16" max="52" step="1" value="26" oninput="setFont(this.value)">
      </div>
    </div>

    <!-- Toggles -->
    <div class="section-label">Opções</div>
    <div class="toggle-pills">
      <button class="pill on" id="pill-overlay" onclick="togglePill(this,'overlay')">👁 Overlay</button>
      <button class="pill" id="pill-mirror" onclick="togglePill(this,'mirror')">↔ Espelho</button>
      <button class="pill on" id="pill-guides" onclick="togglePill(this,'guides')">🎯 Guias</button>
    </div>

    <!-- Camera -->
    <div class="section-label">Câmera</div>
    <select class="cam-select" id="cam-select" onchange="onCamChange()">
      <option value="">Câmera frontal (padrão)</option>
    </select>

    <!-- Start -->
    <button class="btn-start" id="btn-go" onclick="goToStudio()">🎬 INICIAR GRAVAÇÃO</button>

  </div>
</div>

<!-- ═══════════════════════════════════
     SCREEN 2 — STUDIO
═══════════════════════════════════ -->
<div class="screen hidden" id="screen-studio">

  <!-- Camera full screen -->
  <video id="camera-video" autoplay muted playsinline webkit-playsinline></video>

  <!-- Three.js overlay -->
  <canvas id="three-canvas"></canvas>

  <!-- HUD -->
  <div class="hud" id="hud-el">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="eye-line" id="eye-line-el"></div>
    <div class="eye-line-label" id="eye-label-el">EYE LINE</div>
    <div class="read-line" id="read-line-el"></div>
  </div>

  <!-- REC badge -->
  <div id="rec-badge">
    <div id="rec-dot-live"></div>
    <span id="rec-time-live">00:00</span>
  </div>

  <!-- Speed HUD -->
  <div id="speed-hud" id="speed-hud-el">1.2×</div>

  <!-- Teleprompter -->
  <div id="tp-overlay" style="display:none">
    <div id="tp-mask"></div>
    <div id="tp-track"><div id="tp-text"></div></div>
  </div>

  <!-- Bottom Controls -->
  <div id="studio-controls">

    <!-- Speed slider (compact) -->
    <div class="speed-row">
      <span>Speed</span>
      <input type="range" id="r-speed2" min="0.3" max="5" step="0.1" value="1.2" oninput="setSpeed(this.value); document.getElementById('r-speed').value=this.value">
      <span class="sv" id="v-speed2">1.2×</span>
    </div>

    <!-- Prompter toggle -->
    <div class="prompt-bar">
      <button class="back-btn" onclick="goBack()">← Voltar</button>
      <button id="btn-prompt-toggle" onclick="togglePrompter()">▶ Iniciar Leitura</button>
    </div>

    <!-- Main actions -->
    <div class="action-row">
      <button class="act-btn marker-btn" onclick="addMarker()" title="Marcador">🚩</button>
      <button class="act-btn primary" id="btn-rec" onclick="toggleRecord()">⏺</button>
      <button class="act-btn" onclick="flipCam()" title="Virar câmera">🔄</button>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════
     SCREEN 3 — SAVE
═══════════════════════════════════ -->
<div class="screen hidden" id="screen-save">
  <div class="save-box">
    <div class="save-icon">🎉</div>
    <div class="save-title">GRAVAÇÃO SALVA!</div>
    <div class="save-sub">Seu vídeo está pronto. Toque em baixar para salvar na galeria ou no armazenamento do celular.</div>

    <div class="save-info">
      <div class="save-row">
        <span class="save-row-label">Duração</span>
        <span class="save-row-val" id="save-dur">—</span>
      </div>
      <div class="save-row">
        <span class="save-row-label">Tamanho</span>
        <span class="save-row-val" id="save-size">—</span>
      </div>
      <div class="save-row">
        <span class="save-row-label">Marcadores</span>
        <span class="save-row-val" id="save-marks">0</span>
      </div>
      <div class="save-row">
        <span class="save-row-label">Formato</span>
        <span class="save-row-val">MP4 / WebM</span>
      </div>
    </div>

    <a id="download-link" class="btn-download" download="gravacao.webm">
      ⬇ BAIXAR VÍDEO
    </a>

    <button class="btn-new" onclick="newRecording()">+ Nova Gravação</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const ST = {
  speed: 1.2,
  fontSize: 26,
  overlay: true,
  mirror: false,
  guides: true,
  stream: null,
  facingMode: 'user',
  selectedDeviceId: null,
  isRecording: false,
  mediaRecorder: null,
  chunks: [],
  totalBytes: 0,
  recStart: null,
  timerID: null,
  prompterOn: false,
  scrollY: 0,
  promptRAF: null,
  lastTS: null,
  markers: [],
  recDuration: 0,
  // three
  threeRenderer: null, threeScene: null, threeCamera: null,
  gridMesh: null, frameMesh: null, threeOn: true,
};

// ══════════════════════════════════════════════
// SCREEN NAVIGATION
// ══════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function toast(msg, type='green') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════
// CONTROLS (shared between screens)
// ══════════════════════════════════════════════
function setSpeed(v) {
  ST.speed = parseFloat(v);
  const txt = ST.speed.toFixed(1) + '×';
  document.getElementById('v-speed').textContent = txt;
  document.getElementById('v-speed2').textContent = txt;
  document.getElementById('speed-hud').textContent = txt;
  // sync both sliders
  document.getElementById('r-speed').value = v;
  document.getElementById('r-speed2').value = v;
}

function setFont(v) {
  ST.fontSize = parseInt(v);
  document.getElementById('v-font').textContent = ST.fontSize + 'px';
  document.getElementById('tp-text').style.fontSize = ST.fontSize + 'px';
}

function togglePill(el, key) {
  ST[key] = !ST[key];
  el.classList.toggle('on', ST[key]);
  applySettings();
}

function applySettings() {
  // Mirror
  document.getElementById('tp-text').classList.toggle('mirror', ST.mirror);
  document.getElementById('camera-video').style.transform = ST.mirror ? 'scaleX(-1)' : '';
  // Overlay visibility
  document.getElementById('tp-overlay').style.display = ST.overlay ? 'block' : 'none';
  // Guides
  const g = ST.guides;
  const opacity = g ? '1' : '0';
  ['eye-line-el','eye-label-el','read-line-el'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = opacity;
  });
}

// ══════════════════════════════════════════════
// CAMERA INIT
// ══════════════════════════════════════════════
async function initCamera(deviceId) {
  try {
    if (ST.stream) ST.stream.getTracks().forEach(t => t.stop());
    const constraints = {
      video: deviceId
        ? { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        : { facingMode: ST.facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }
    };
    ST.stream = await navigator.mediaDevices.getUserMedia(constraints);
    document.getElementById('camera-video').srcObject = ST.stream;
    return true;
  } catch(e) {
    toast('Câmera: ' + e.message, 'red');
    return false;
  }
}

async function populateCams() {
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('cam-select');
    sel.innerHTML = '';
    const vids = devs.filter(d => d.kind === 'videoinput');
    if (!vids.length) { sel.innerHTML = '<option>Nenhuma câmera encontrada</option>'; return; }
    vids.forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.deviceId;
      o.textContent = d.label || (i === 0 ? 'Câmera Frontal' : 'Câmera Traseira');
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function onCamChange() {
  const sel = document.getElementById('cam-select');
  ST.selectedDeviceId = sel.value;
}

async function flipCam() {
  ST.facingMode = ST.facingMode === 'user' ? 'environment' : 'user';
  ST.selectedDeviceId = null;
  await initCamera(null);
  toast('Câmera virada 🔄');
}

// ══════════════════════════════════════════════
// GO TO STUDIO
// ══════════════════════════════════════════════
async function goToStudio() {
  document.getElementById('btn-go').textContent = 'Carregando câmera...';
  document.getElementById('btn-go').disabled = true;

  const ok = await initCamera(ST.selectedDeviceId || null);
  if (!ok) {
    document.getElementById('btn-go').textContent = '🎬 INICIAR GRAVAÇÃO';
    document.getElementById('btn-go').disabled = false;
    return;
  }
  await populateCams();

  // Build script text
  buildScript();
  applySettings();
  setFont(ST.fontSize);
  show('screen-studio');
  initThree();

  document.getElementById('btn-go').textContent = '🎬 INICIAR GRAVAÇÃO';
  document.getElementById('btn-go').disabled = false;
}

function goBack() {
  stopPrompter();
  if (ST.isRecording) stopRecording();
  if (ST.stream) ST.stream.getTracks().forEach(t => t.stop());
  ST.stream = null;
  show('screen-script');
}

// ══════════════════════════════════════════════
// THREE.JS — Cinematic Overlay
// ══════════════════════════════════════════════
function initThree() {
  const canvas = document.getElementById('three-canvas');
  const W = window.innerWidth, H = window.innerHeight;

  if (ST.threeRenderer) {
    ST.threeRenderer.setSize(W, H);
    return;
  }

  ST.threeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  ST.threeRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  ST.threeRenderer.setSize(W, H);
  ST.threeRenderer.setClearColor(0, 0);

  ST.threeScene = new THREE.Scene();
  ST.threeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
  ST.threeCamera.position.z = 1;

  // Grid
  ST.gridMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 2, 10, 16),
    new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.055 })
  );
  ST.threeScene.add(ST.gridMesh);

  // Cinematic corners
  const s = 0.93, c = 0.1;
  const v = new Float32Array([
    -s,-s,0, -s+c,-s,0,  -s,-s,0, -s,-s+c,0,
     s,-s,0,  s-c,-s,0,   s,-s,0,  s,-s+c,0,
    -s, s,0, -s+c, s,0,  -s, s,0, -s, s-c,0,
     s, s,0,  s-c, s,0,   s, s,0,  s, s-c,0,
  ]);
  const fGeo = new THREE.BufferGeometry();
  fGeo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  ST.frameMesh = new THREE.LineSegments(fGeo,
    new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.5 })
  );
  ST.threeScene.add(ST.frameMesh);

  let ft = 0;
  (function loop() {
    requestAnimationFrame(loop);
    ft += 0.018;
    if (ST.gridMesh) ST.gridMesh.material.opacity = 0.04 + Math.sin(ft) * 0.015;
    if (ST.frameMesh) ST.frameMesh.material.opacity = 0.38 + Math.sin(ft * 0.6) * 0.15;
    ST.threeRenderer.render(ST.threeScene, ST.threeCamera);
  })();

  window.addEventListener('resize', () => {
    ST.threeRenderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ══════════════════════════════════════════════
// TELEPROMPTER ENGINE
// ══════════════════════════════════════════════
function buildScript() {
  const raw = document.getElementById('script-input').value || 'Adicione seu roteiro na tela anterior.';
  document.getElementById('tp-text').innerHTML = raw
    .replace(/\[SEÇÃO:\s*([^\]]+)\]/g, '<div style="color:#ffb800;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;margin:20px 0 8px;font-weight:800;opacity:0.8">▸ $1</div>')
    .replace(/\[PAUSE\]/g, '<div style="color:#00d4ff;font-size:16px;margin:16px 0;opacity:0.7">⏸ PAUSA</div>')
    .replace(/\n/g, '<br>');
  ST.scrollY = 0;
  document.getElementById('tp-track').style.transform = 'translateY(0)';
}

function togglePrompter() {
  ST.prompterOn ? stopPrompter() : startPrompter();
}

function startPrompter() {
  ST.prompterOn = true;
  document.getElementById('tp-overlay').style.display = 'block';
  const btn = document.getElementById('btn-prompt-toggle');
  btn.textContent = '⏸ Pausar Leitura';
  btn.classList.add('running');
  ST.lastTS = null;
  ST.promptRAF = requestAnimationFrame(stepPrompter);
}

function stopPrompter() {
  ST.prompterOn = false;
  if (ST.promptRAF) cancelAnimationFrame(ST.promptRAF);
  const btn = document.getElementById('btn-prompt-toggle');
  btn.textContent = '▶ Iniciar Leitura';
  btn.classList.remove('running');
}

function stepPrompter(ts) {
  if (!ST.prompterOn) return;
  if (ST.lastTS === null) ST.lastTS = ts;
  const delta = (ts - ST.lastTS) / 1000;
  ST.lastTS = ts;
  ST.scrollY += ST.speed * delta * 55;
  document.getElementById('tp-track').style.transform = `translateY(-${ST.scrollY}px)`;
  const maxH = document.getElementById('tp-text').scrollHeight;
  if (ST.scrollY >= maxH) {
    stopPrompter();
    toast('Roteiro concluído! ✓', 'green');
    return;
  }
  ST.promptRAF = requestAnimationFrame(stepPrompter);
}

// ══════════════════════════════════════════════
// RECORDING ENGINE
// ══════════════════════════════════════════════
async function toggleRecord() {
  if (!ST.stream) {
    toast('Câmera não disponível', 'red'); return;
  }
  ST.isRecording ? stopRecording() : startRecording();
}

function getMime() {
  const candidates = [
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
  ];
  return candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

function startRecording() {
  ST.chunks = [];
  ST.totalBytes = 0;
  ST.markers = [];

  const mime = getMime();
  const opts = { videoBitsPerSecond: 6_000_000 };
  if (mime) opts.mimeType = mime;

  try {
    ST.mediaRecorder = new MediaRecorder(ST.stream, opts);
  } catch(e) {
    ST.mediaRecorder = new MediaRecorder(ST.stream);
  }

  ST.mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) {
      ST.chunks.push(e.data);
      ST.totalBytes += e.data.size;
    }
  };

  ST.mediaRecorder.onstop = () => onRecordingStop();
  ST.mediaRecorder.start(500); // collect every 500ms

  ST.isRecording = true;
  ST.recStart = Date.now();

  const btn = document.getElementById('btn-rec');
  btn.textContent = '⏹';
  btn.classList.add('recording');
  document.getElementById('rec-badge').classList.add('show');

  ST.timerID = setInterval(() => {
    const e = Math.floor((Date.now() - ST.recStart) / 1000);
    document.getElementById('rec-time-live').textContent =
      `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  }, 500);

  // auto-start prompter
  if (!ST.prompterOn) startPrompter();
  toast('● Gravando…', 'orange');
}

function stopRecording() {
  if (ST.mediaRecorder && ST.mediaRecorder.state !== 'inactive') {
    ST.mediaRecorder.stop();
  }
  ST.isRecording = false;
  clearInterval(ST.timerID);

  const btn = document.getElementById('btn-rec');
  btn.textContent = '⏺';
  btn.classList.remove('recording');
  document.getElementById('rec-badge').classList.remove('show');

  ST.recDuration = (Date.now() - ST.recStart) / 1000;
  if (ST.prompterOn) stopPrompter();
  toast('Finalizando gravação…', 'green');
}

function onRecordingStop() {
  if (!ST.chunks.length) { toast('Nenhum dado gravado.', 'red'); return; }
  const mime = ST.mediaRecorder.mimeType || 'video/webm';
  const blob = new Blob(ST.chunks, { type: mime });
  const url  = URL.createObjectURL(blob);

  // Fill save screen info
  document.getElementById('save-dur').textContent  = fmtTime(ST.recDuration);
  document.getElementById('save-size').textContent = fmtBytes(blob.size);
  document.getElementById('save-marks').textContent = ST.markers.length;

  // Determine file extension
  const ext = mime.includes('mp4') ? 'mp4' : 'webm';
  const filename = `gravacao_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.${ext}`;

  const link = document.getElementById('download-link');
  link.href = url;
  link.download = filename;

  show('screen-save');
}

// ══════════════════════════════════════════════
// MARKERS
// ══════════════════════════════════════════════
function addMarker() {
  if (!ST.isRecording) { toast('Grave primeiro para adicionar marcadores', 'orange'); return; }
  const elapsed = (Date.now() - ST.recStart) / 1000;
  ST.markers.push({ t: elapsed, label: 'M' + (ST.markers.length + 1) });
  toast(`🚩 Marcador ${ST.markers.length} — ${fmtTime(elapsed)}`, 'orange');
}

// ══════════════════════════════════════════════
// NEW RECORDING
// ══════════════════════════════════════════════
function newRecording() {
  ST.chunks = [];
  ST.totalBytes = 0;
  ST.scrollY = 0;
  ST.markers = [];
  ST.recDuration = 0;
  document.getElementById('tp-track').style.transform = 'translateY(0)';
  document.getElementById('rec-time-live').textContent = '00:00';
  show('screen-script');
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function fmtTime(s) {
  const m = Math.floor(s / 60);
  return `${m}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
}
function fmtBytes(b) {
  if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

// ══════════════════════════════════════════════
// KEYBOARD (desktop/bluetooth clicker)
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePrompter(); }
  if (e.key === 'r' || e.key === 'R') toggleRecord();
  if (e.key === 'm' || e.key === 'M') addMarker();
  if (e.key === 'ArrowUp')   { const el = document.getElementById('r-speed'); el.value = Math.min(5, parseFloat(el.value) + 0.2); setSpeed(el.value); }
  if (e.key === 'ArrowDown') { const el = document.getElementById('r-speed'); el.value = Math.max(0.3, parseFloat(el.value) - 0.2); setSpeed(el.value); }
  if (e.key === 'Escape') stopPrompter();
});

// ══════════════════════════════════════════════
// SWIPE UP — speed up (gesture)
// ══════════════════════════════════════════════
let touchY0 = null;
document.getElementById('screen-studio').addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, { passive: true });
document.getElementById('screen-studio').addEventListener('touchend', e => {
  if (touchY0 === null) return;
  const dy = touchY0 - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 50) {
    const el = document.getElementById('r-speed');
    el.value = Math.max(0.3, Math.min(5, parseFloat(el.value) + (dy > 0 ? 0.2 : -0.2)));
    setSpeed(el.value);
    toast('Velocidade: ' + ST.speed.toFixed(1) + '×');
  }
  touchY0 = null;
}, { passive: true });

// ══════════════════════════════════════════════
// INIT — request camera permission upfront
// ══════════════════════════════════════════════
window.addEventListener('load', async () => {
  // Pre-request permission so enumerate works
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    s.getTracks().forEach(t => t.stop()); // just get permission
    await populateCams();
  } catch(e) {
    // will try again on goToStudio
  }
});
</script>
